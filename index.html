<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Where It Looked</title>
<style>
  :root {
    --cream: #f6f1e7;
    --ink: #1f1b16;
    --ink-soft: #4a443b;
    --rule: #d8cfbe;
    --serif: Georgia, "Times New Roman", serif;
    --sans: "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 56px 28px 80px;
  }
  .query {
    font-family: var(--sans);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .query strong {
    color: var(--ink);
    font-weight: 600;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 2.6rem;
    line-height: 1.12;
    margin: 0 0 28px;
    max-width: 22ch;
  }
  .divergence {
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 20px 0;
    margin: 0 0 40px;
  }
  .divergence .num {
    font-family: var(--serif);
    font-size: 2.1rem;
    color: var(--ink);
  }
  .divergence .label {
    display: block;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .controls {
    margin: 0 0 32px;
  }
  button.toggle {
    font-family: var(--sans);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  button.toggle:hover { background: var(--ink); color: var(--cream); }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .card {
    background: var(--cream);
    padding: 24px 22px 26px;
  }
  .card h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.4rem;
    margin: 0 0 2px;
  }
  .card .tone {
    font-size: 0.8rem;
    color: var(--ink-soft);
    font-style: italic;
    margin: 0 0 18px;
  }
  ol.results {
    list-style: none;
    margin: 0;
    padding: 0;
    counter-reset: rank;
  }
  ol.results li {
    counter-increment: rank;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
  }
  ol.results li:first-child { border-top: none; }
  .res-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .res-rank {
    font-family: var(--serif);
    color: var(--ink-soft);
    font-size: 0.95rem;
    min-width: 1.1em;
  }
  .res-name {
    font-weight: 600;
    font-size: 1.02rem;
  }
  .res-meta {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin: 2px 0 4px 1.9em;
  }
  .res-blurb {
    font-size: 0.86rem;
    color: var(--ink);
    margin: 0 0 0 1.9em;
  }
  .boundary {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed var(--rule);
    font-size: 0.82rem;
    color: var(--ink-soft);
    display: none;
  }
  .boundary.show { display: block; }
  .boundary .line { margin: 0 0 3px; }
  .boundary .line span { color: var(--ink); font-weight: 600; }
  .note {
    margin: 44px 0 0;
    font-size: 0.8rem;
    color: var(--ink-soft);
    max-width: 60ch;
  }
  @media (max-width: 760px) {
    .cards { grid-template-columns: 1fr; }
    h1 { font-size: 2.1rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="query">Query &nbsp;·&nbsp; <strong>Lisbon — 2 nights, walkable, mid-range.</strong></p>
  <h1>Three assistants. One question. Three different "best" answers.</h1>

  <div class="divergence">
    <span class="label">Overlap across the three "best" lists</span>
    <span class="num" id="overlap">— of 3</span>
  </div>

  <div class="controls">
    <button class="toggle" id="toggle" aria-pressed="false">Show the boundary</button>
  </div>

  <div class="cards" id="cards"></div>

  <p class="note" id="note"></p>

</div>

<script>
// ---- Data: illustrative model. Invented hotels; not real OTA data. ----
const HOTELS = [
  { id:"H1",  name:"Casa Aurelia",            neighborhood:"Alfama",         price:165, rating:4.3, walk:88, partner:true,  editorial:true,  recScore:95 },
  { id:"H2",  name:"The Tram House",          neighborhood:"Baixa",          price:158, rating:4.2, walk:92, partner:true,  editorial:false, recScore:92 },
  { id:"H3",  name:"Pensão Marquês",          neighborhood:"Chiado",         price:172, rating:4.4, walk:90, partner:true,  editorial:false, recScore:90 },
  { id:"H4",  name:"Hotel Lumiar Velho",      neighborhood:"Graça",          price:135, rating:4.1, walk:79, partner:true,  editorial:true,  recScore:70 },
  { id:"H5",  name:"Rossio Rooms",            neighborhood:"Baixa",          price:128, rating:4.0, walk:91, partner:true,  editorial:false, recScore:64 },
  { id:"H6",  name:"Miradouro Suites",        neighborhood:"Graça",          price:149, rating:4.8, walk:85, partner:false, editorial:true,  recScore:85 },
  { id:"H7",  name:"Alfama Quiet House",      neighborhood:"Alfama",         price:142, rating:4.7, walk:87, partner:false, editorial:true,  recScore:81 },
  { id:"H8",  name:"Bica Budget Stay",        neighborhood:"Bairro Alto",    price:92,  rating:4.0, walk:84, partner:false, editorial:false, recScore:60 },
  { id:"H9",  name:"Intendente Inn",          neighborhood:"Intendente",     price:98,  rating:3.9, walk:76, partner:false, editorial:false, recScore:55 },
  { id:"H10", name:"Anjos Apartments",        neighborhood:"Anjos",          price:104, rating:4.1, walk:80, partner:false, editorial:false, recScore:67 },
  { id:"H11", name:"Príncipe Real Townhouse", neighborhood:"Príncipe Real",  price:176, rating:4.7, walk:83, partner:false, editorial:true,  recScore:79 },
  { id:"H12", name:"Cais Garden Hotel",       neighborhood:"Cais do Sodré",  price:119, rating:4.4, walk:88, partner:false, editorial:true,  recScore:94 }
];

// ---- Assistant definitions: each is a visible-set filter + a ranking rule. ----
// The lists are NOT hardcoded — they are computed from the data below.
const ASSISTANTS = [
  {
    key: "concierge",
    name: "Concierge",
    tone: "Warm, certain, eager to please.",
    sliceLabel: "partner hotels only",
    ruleLabel: "recommended for you",
    visible: h => h.partner === true,
    rank: (a, b) => (b.recScore - a.recScore) || (a.price - b.price)
  },
  {
    key: "scout",
    name: "Scout",
    tone: "Brisk, value-first, no fuss.",
    sliceLabel: "full index",
    ruleLabel: "lowest price",
    visible: () => true,
    rank: (a, b) => (a.price - b.price) || (b.rating - a.rating)
  },
  {
    key: "critic",
    name: "Critic",
    tone: "Discerning, assured, a little superior.",
    sliceLabel: "editorial selection",
    ruleLabel: "highest rating",
    visible: h => h.editorial === true,
    rank: (a, b) => (b.rating - a.rating) || (a.price - b.price)
  }
];

// Placeholder confident blurbs (final copy: Session 2). Tone stays certain.
const BLURBS = [
  "Right in the heart of it — our top pick for the walk.",
  "A confident second; you can't go wrong here.",
  "Rounds out the three we'd stake our name on."
];

// ---- Pure ranking pipeline: filter visible set → sort → take top three. ----
function visibleSet(assistant) {
  return HOTELS.filter(assistant.visible);
}
function topThree(assistant) {
  return visibleSet(assistant).slice().sort(assistant.rank).slice(0, 3);
}

// ---- Overlap: hotel ids present in ALL THREE top-three lists. ----
function computeOverlap(lists) {
  const [a, b, c] = lists.map(list => new Set(list.map(h => h.id)));
  let shared = 0;
  for (const id of a) if (b.has(id) && c.has(id)) shared++;
  return shared;
}

// ---- Render ----
const results = ASSISTANTS.map(topThree);
const overlap = computeOverlap(results);

// Honesty check: with the embedded data the three lists must not overlap.
console.assert(overlap === 0, "Expected 0 overlap across the three lists; got " + overlap);
console.assert(
  results.map(r => r.map(h => h.id).join(",")).join(" | ") ===
  "H1,H2,H3 | H8,H9,H10 | H6,H7,H11",
  "Top-threes drifted from expected ids."
);

document.getElementById("overlap").textContent = overlap + " of 3";

const cardsEl = document.getElementById("cards");
ASSISTANTS.forEach((assistant, i) => {
  const list = results[i];
  const seen = visibleSet(assistant).length;
  const total = HOTELS.length;

  const items = list.map((h, j) => `
    <li>
      <div class="res-head">
        <span class="res-rank">${j + 1}.</span>
        <span class="res-name">${h.name}</span>
      </div>
      <div class="res-meta">${h.neighborhood} · €${h.price}/night · ${h.rating.toFixed(1)}★</div>
      <p class="res-blurb">${BLURBS[j]}</p>
    </li>
  `).join("");

  cardsEl.insertAdjacentHTML("beforeend", `
    <div class="card">
      <h2>${assistant.name}</h2>
      <p class="tone">${assistant.tone}</p>
      <ol class="results">${items}</ol>
      <div class="boundary" id="boundary-${assistant.key}">
        <p class="line">Searched: <span>${assistant.sliceLabel} (${seen} of ${total} listed)</span></p>
        <p class="line">Ranked by: <span>${assistant.ruleLabel}</span></p>
      </div>
    </div>
  `);
});

// ---- Boundary toggle ----
const toggle = document.getElementById("toggle");
let shown = false;
toggle.addEventListener("click", () => {
  shown = !shown;
  document.querySelectorAll(".boundary").forEach(el => el.classList.toggle("show", shown));
  toggle.textContent = shown ? "Hide the boundary" : "Show the boundary";
  toggle.setAttribute("aria-pressed", String(shown));
});

document.getElementById("note").textContent =
  "Illustrative model. Hotels, prices, and ratings are invented; rankings are deterministic, not live.";
</script>
</body>
</html>
