<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Where It Looked</title>
<style>
  :root {
    --cream: #f6f1e7;
    --ink: #1f1b16;
    --ink-soft: #4a443b;
    --rule: #d8cfbe;
    --display-face: Georgia, serif;   /* swap face here — one line */
    --sans: "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 56px 28px 80px;
  }
  .query {
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .query strong { color: var(--ink); font-weight: 600; }
  h1 {
    font-family: var(--display-face);
    font-weight: 400;
    font-size: 2.6rem;
    line-height: 1.12;
    margin: 0 0 28px;
    max-width: 22ch;
  }
  .divergence {
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 20px 0;
    margin: 0 0 40px;
  }
  .divergence .label {
    display: block;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .divergence .num {
    font-family: var(--display-face);
    font-size: 2.1rem;
    color: var(--ink);
  }
  .controls { margin: 0 0 32px; }
  button.toggle {
    font-family: var(--sans);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  button.toggle:hover { background: var(--ink); color: var(--cream); }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .card { background: var(--cream); padding: 24px 22px 26px; }
  .card h2 {
    font-family: var(--display-face);
    font-weight: 400;
    font-size: 1.4rem;
    margin: 0 0 4px;
  }
  .card .blurb {
    font-size: 0.88rem;
    color: var(--ink-soft);
    font-style: italic;
    margin: 0 0 18px;
    line-height: 1.45;
  }
  ol.results {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ol.results li {
    padding: 14px 0;
    border-top: 1px solid var(--rule);
  }
  ol.results li:first-child { border-top: none; }
  .res-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .res-rank {
    font-family: var(--display-face);
    color: var(--ink-soft);
    font-size: 0.95rem;
    min-width: 1.1em;
  }
  .res-name { font-weight: 600; font-size: 1.02rem; }
  .res-meta {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin: 2px 0 0 1.9em;
  }
  .boundary {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed var(--rule);
    font-size: 0.82rem;
    color: var(--ink-soft);
    display: none;
  }
  .boundary.show { display: block; }
  .boundary .line { margin: 0 0 4px; }
  .boundary .line span { color: var(--ink); font-weight: 600; }
  /* Atlas boundary slider */
  .slider-wrap { margin: 6px 0 4px; }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    display: block;
    width: 100%;
    background: transparent;
    cursor: pointer;
    outline: none;
    margin: 0;
    padding: 0;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    background: var(--rule);
    height: 2px;
    border-radius: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--ink);
    margin-top: -8px;
    border: none;
  }
  input[type="range"]::-moz-range-track {
    background: var(--rule);
    height: 2px;
    border: none;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
  }
  input[type="range"]:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
    border-radius: 2px;
  }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin-top: 5px;
    letter-spacing: 0.02em;
  }
  .slider-wrap + .line { margin-top: 10px; }
  .note {
    margin: 44px 0 0;
    font-size: 0.8rem;
    color: var(--ink-soft);
    max-width: 60ch;
    line-height: 1.6;
  }
  @media (max-width: 760px) {
    .wrap { padding: 36px 20px 60px; }
    h1 { font-size: 2rem; max-width: none; }
    .divergence .num { font-size: 1.8rem; }
    .cards { grid-template-columns: 1fr; }
    input[type="range"]::-webkit-slider-thumb {
      width: 28px;
      height: 28px;
      margin-top: -13px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
    }
  }
  @media (max-width: 400px) {
    h1 { font-size: 1.7rem; }
    .divergence .num { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="query">Query &nbsp;·&nbsp; <strong>Lisbon — 2 nights, walkable, mid-range.</strong></p>
  <h1>Three assistants. One question. Three different "best" answers.</h1>

  <div class="divergence">
    <span class="label">Overlap across the three "best" lists</span>
    <span class="num" id="overlap">— of 3</span>
  </div>

  <div class="controls">
    <button class="toggle" id="toggle" aria-pressed="false">Show the boundary</button>
  </div>

  <div class="cards" id="cards"></div>

  <p class="note" id="note"></p>

</div>

<script>
// ---- Data: illustrative model. Invented hotels; not real OTA data. ----
const HOTELS = [
  { id:"H1",  name:"Casa Aurelia",            neighborhood:"Alfama",        price:165, rating:4.3, partner:true,  editorial:true,  recScore:95 },
  { id:"H2",  name:"The Tram House",          neighborhood:"Baixa",         price:158, rating:4.2, partner:true,  editorial:false, recScore:92 },
  { id:"H3",  name:"Pensão Marquês",          neighborhood:"Chiado",        price:172, rating:4.4, partner:true,  editorial:false, recScore:90 },
  { id:"H4",  name:"Hotel Lumiar Velho",      neighborhood:"Graça",         price:135, rating:4.1, partner:true,  editorial:true,  recScore:70 },
  { id:"H5",  name:"Rossio Rooms",            neighborhood:"Baixa",         price:128, rating:4.0, partner:true,  editorial:false, recScore:64 },
  { id:"H6",  name:"Miradouro Suites",        neighborhood:"Graça",         price:149, rating:4.8, partner:false, editorial:true,  recScore:85 },
  { id:"H7",  name:"Alfama Quiet House",      neighborhood:"Alfama",        price:142, rating:4.7, partner:false, editorial:true,  recScore:81 },
  { id:"H8",  name:"Bica Budget Stay",        neighborhood:"Bairro Alto",   price:92,  rating:4.0, partner:false, editorial:false, recScore:60 },
  { id:"H9",  name:"Intendente Inn",          neighborhood:"Intendente",    price:98,  rating:3.9, partner:false, editorial:false, recScore:55 },
  { id:"H10", name:"Anjos Apartments",        neighborhood:"Anjos",         price:104, rating:4.1, partner:false, editorial:false, recScore:67 },
  { id:"H11", name:"Príncipe Real Townhouse", neighborhood:"Príncipe Real", price:176, rating:4.7, partner:false, editorial:true,  recScore:79 },
  { id:"H12", name:"Cais Garden Hotel",       neighborhood:"Cais do Sodré", price:119, rating:4.4, partner:false, editorial:true,  recScore:94 }
];

// ---- Ranking rules (pure functions) ----
const ATLAS_RANK = (a, b) => (b.recScore - a.recScore) || (a.price - b.price);
const VERA_RANK  = (a, b) => (a.price - b.price)       || (b.rating - a.rating);
const PILOT_RANK = (a, b) => (b.rating - a.rating)     || (a.price - b.price);

// ---- Atlas visible-set: 5 partners always; non-partners admitted by id number ----
const PARTNERS     = HOTELS.filter(h => h.partner);
const NON_PARTNERS = HOTELS.filter(h => !h.partner)
  .sort((a, b) => +a.id.slice(1) - +b.id.slice(1));  // H6, H7, H8, H9, H10, H11, H12

const ATLAS_MIN = 5;
const ATLAS_MAX = 12;

function atlasVisible(n) {
  return [...PARTNERS, ...NON_PARTNERS.slice(0, n - ATLAS_MIN)];
}

function atlasTopThree(n) {
  return atlasVisible(n).slice().sort(ATLAS_RANK).slice(0, 3);
}

// ---- Vera and Pilot: static ----
const veraResult  = HOTELS.slice().sort(VERA_RANK).slice(0, 3);
const pilotResult = HOTELS.filter(h => h.editorial).slice().sort(PILOT_RANK).slice(0, 3);

// ---- Overlap ----
function computeOverlap(lists) {
  const [a, b, c] = lists.map(l => new Set(l.map(h => h.id)));
  let n = 0;
  for (const id of a) if (b.has(id) && c.has(id)) n++;
  return n;
}

// ---- Asserts: pin baselines so silent data drift trips them ----
const atlasBaseline   = atlasTopThree(ATLAS_MIN);
const atlasFullMarket = atlasTopThree(ATLAS_MAX);

console.assert(
  atlasBaseline.map(h => h.id).join(",") === "H1,H2,H3",
  "Atlas partner-only baseline (slider=5) drifted: " + atlasBaseline.map(h => h.id).join(",")
);
console.assert(
  atlasFullMarket.map(h => h.id).join(",") === "H1,H12,H2",
  "Atlas full-market (slider=12) drifted: " + atlasFullMarket.map(h => h.id).join(",")
);
console.assert(
  [veraResult, pilotResult].map(r => r.map(h => h.id).join(",")).join(" | ") === "H8,H9,H10 | H6,H7,H11",
  "Vera/Pilot top-threes drifted."
);

const initialOverlap = computeOverlap([atlasBaseline, veraResult, pilotResult]);
console.assert(initialOverlap === 0, "Expected initial overlap 0; got " + initialOverlap);

// ---- Helpers ----
document.getElementById("overlap").textContent = initialOverlap + " of 3";

function hotelItem(h, j) {
  return `<li>
    <div class="res-head">
      <span class="res-rank">${j + 1}.</span>
      <span class="res-name">${h.name}</span>
    </div>
    <div class="res-meta">${h.neighborhood} · €${h.price}/night · ${h.rating.toFixed(1)}★</div>
  </li>`;
}

// ---- Render cards ----
const cardsEl = document.getElementById("cards");

// Atlas — partner-slice, boundary replaced by live slider
cardsEl.insertAdjacentHTML("beforeend", `
  <div class="card">
    <h2>Atlas</h2>
    <p class="blurb">These three are the best fit for what you asked — confident picks, ready to book.</p>
    <ol class="results" id="atlas-results">
      ${atlasBaseline.map(hotelItem).join("")}
    </ol>
    <div class="boundary" id="boundary-atlas">
      <p class="line">Searched: <span id="atlas-count">${ATLAS_MIN} of ${HOTELS.length} listed</span></p>
      <div class="slider-wrap">
        <input type="range" id="atlas-slider"
          min="${ATLAS_MIN}" max="${ATLAS_MAX}" step="1" value="${ATLAS_MIN}"
          aria-label="Widen Atlas search boundary">
        <div class="slider-ticks" aria-hidden="true">
          <span>partners only</span>
          <span>full market</span>
        </div>
      </div>
      <p class="line">Ranked by: <span>recommended for you</span></p>
    </div>
  </div>
`);

// Vera — full index, static boundary
cardsEl.insertAdjacentHTML("beforeend", `
  <div class="card">
    <h2>Vera</h2>
    <p class="blurb">After weighing the options, here's where I'd point you. Clear winners.</p>
    <ol class="results">
      ${veraResult.map(hotelItem).join("")}
    </ol>
    <div class="boundary" id="boundary-vera">
      <p class="line">Searched: <span>full index (12 of 12 listed)</span></p>
      <p class="line">Ranked by: <span>lowest price</span></p>
    </div>
  </div>
`);

// Pilot — editorial selection, static boundary
cardsEl.insertAdjacentHTML("beforeend", `
  <div class="card">
    <h2>Pilot</h2>
    <p class="blurb">Your top three for Lisbon. Hand-checked and trip-ready.</p>
    <ol class="results">
      ${pilotResult.map(hotelItem).join("")}
    </ol>
    <div class="boundary" id="boundary-pilot">
      <p class="line">Searched: <span>editorial selection (6 of 12 listed)</span></p>
      <p class="line">Ranked by: <span>highest rating</span></p>
    </div>
  </div>
`);

// ---- Boundary toggle (all three cards) ----
const toggle = document.getElementById("toggle");
let shown = false;
toggle.addEventListener("click", () => {
  shown = !shown;
  document.querySelectorAll(".boundary").forEach(el => el.classList.toggle("show", shown));
  toggle.textContent = shown ? "Hide the boundary" : "Show the boundary";
  toggle.setAttribute("aria-pressed", String(shown));
});

// ---- Atlas slider: live re-sort on every change ----
document.getElementById("atlas-slider").addEventListener("input", function () {
  const n = +this.value;
  const list = atlasTopThree(n);
  document.getElementById("atlas-count").textContent = n + " of " + HOTELS.length + " listed";
  document.getElementById("atlas-results").innerHTML = list.map(hotelItem).join("");
  const ov = computeOverlap([list, veraResult, pilotResult]);
  document.getElementById("overlap").textContent = ov + " of 3";
});

// ---- Illustrative note (locked copy) ----
document.getElementById("note").textContent =
  "Illustrative model. Hotels, prices, and rankings are invented to show how a hidden search boundary changes the answer — not real listings, and not any real assistant.";
</script>
</body>
</html>
